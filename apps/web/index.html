<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>REPLACE_ME</title>
  <meta name="description" content="Built from claude-cloudflare-template." />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fafaf9;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #f38020;
      --line: #e5e5e3;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0f0f0e; --fg: #f0f0ed; --muted: #888; --line: #2a2a28; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--fg);
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
    }
    main { max-width: 640px; margin: 0 auto; padding: 6rem 1.5rem 4rem; }
    h1 { font-size: 2rem; margin: 0 0 0.5rem; letter-spacing: -0.02em; }
    p { color: var(--muted); margin: 0 0 1.25rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav { display: flex; gap: 1rem; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--line); font-size: 0.95rem; }
    code { background: var(--line); padding: 0.1em 0.35em; border-radius: 3px; font-size: 0.9em; }
  </style>
</head>
<body>
  <main>
    <h1>REPLACE_ME</h1>
    <p>Built from <a href="https://github.com/hien-p/claude-cloudflare-template"><code>claude-cloudflare-template</code></a>. Replace this copy in <code>apps/web/index.html</code>.</p>
    <p>Local dev: <code>python3 -m http.server 8787 --directory apps/web</code> or <code>npx wrangler dev</code>.</p>
    <nav>
      <a href="/logs/">Devlog →</a>
    </nav>
  </main>
</body>
</html>
