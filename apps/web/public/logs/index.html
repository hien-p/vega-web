<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Devlog · REPLACE_ME</title>
  <meta name="description" content="A running log of changes shipped to this project." />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fafaf9;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #f38020;
      --line: #e5e5e3;
      --card-bg: #fff;
      --tag-feat: #2563eb;
      --tag-fix:  #dc2626;
      --tag-chore:#6b6b6b;
      --tag-docs: #16a34a;
      --tag-refactor: #9333ea;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0f0f0e; --fg: #f0f0ed; --muted: #888; --line: #2a2a28; --card-bg: #181816; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--fg);
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 4rem 1.5rem; }
    header.page { margin-bottom: 2.5rem; }
    header.page h1 { font-size: 1.75rem; margin: 0 0 0.25rem; letter-spacing: -0.02em; }
    header.page p { color: var(--muted); margin: 0; }
    header.page a { color: var(--accent); text-decoration: none; }
    header.page a:hover { text-decoration: underline; }

    #log-stream { display: flex; flex-direction: column; gap: 1rem; }

    .log-card {
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
    }
    .log-card header {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }
    .log-card time { color: var(--muted); font-variant-numeric: tabular-nums; }
    .log-tag {
      display: inline-block;
      padding: 0.1em 0.6em;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: white;
      background: var(--tag-chore);
    }
    .log-tag[data-tag="feat"]     { background: var(--tag-feat); }
    .log-tag[data-tag="fix"]      { background: var(--tag-fix); }
    .log-tag[data-tag="chore"]    { background: var(--tag-chore); }
    .log-tag[data-tag="docs"]     { background: var(--tag-docs); }
    .log-tag[data-tag="refactor"] { background: var(--tag-refactor); }

    .log-card h3 { margin: 0 0 0.4rem; font-size: 1.05rem; line-height: 1.35; }
    .log-card p  { margin: 0; color: var(--muted); font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="page">
      <h1>Devlog</h1>
      <p>A running log of what shipped. <a href="/">← back to site</a></p>
    </header>

    <main id="log-stream">

      <!--
        ADD NEW CARDS AT THE TOP. Keep entries terse.
        Tag values: feat | fix | chore | docs | refactor
      -->

      <article class="log-card" data-date="2026-05-05">
        <header>
          <time datetime="2026-05-05">2026-05-05</time>
          <span class="log-tag" data-tag="chore">chore</span>
        </header>
        <h3>Project scaffolded from claude-cloudflare-template</h3>
        <p>Initial commit. Static site under <code>apps/web/</code>, Cloudflare Workers via <code>wrangler.toml</code>, commit-msg + pre-push hooks installed, devlog convention live.</p>
      </article>

    </main>
  </div>
</body>
</html>
